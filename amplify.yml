version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Prefer `npm ci` (reproducible) when lockfile is present, fall back otherwise.
        - npm ci || npm install
    build:
      commands:
        # Generate sitemap from live API (non-fatal if API is unreachable).
        - npm run sitemap || echo "sitemap step skipped"
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - ~/.npm/**/*
